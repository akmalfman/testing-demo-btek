<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .counter-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        #counter-value {
            font-size: 4rem;
            margin: 1rem 0;
            font-weight: bold;
            color: #007bff;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        .btn-minus { background-color: #dc3545; color: white; }
        .btn-plus { background-color: #28a745; color: white; }
        .btn-reset { background-color: #6c757d; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="counter-container">
        <h1>Counter</h1>
        <!-- Elemen untuk Unit Testing -->
        <div id="counter-value" data-testid="counter-display">0</div>
        
        <div class="buttons">
            <button class="btn-minus" id="btn-minus" data-testid="minus-button">Kurang (-)</button>
            <button class="btn-reset" id="btn-reset" data-testid="reset-button">Reset</button>
            <button class="btn-plus" id="btn-plus" data-testid="plus-button">Tambah (+)</button>
        </div>
    </div>

    <script src="./lib/counter.js"></script>

<script>
    const counter = createCounter(0);
    const display = document.getElementById('counter-value');

    document.getElementById('btn-plus').addEventListener('click', () => {
        display.innerText = counter.increment();
    });

    document.getElementById('btn-minus').addEventListener('click', () => {
        display.innerText = counter.decrement();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        display.innerText = counter.reset();
    });
</script>
</body>
</html>
